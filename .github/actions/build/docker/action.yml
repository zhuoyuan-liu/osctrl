name: "Build Osctrl Docker images"
description: "Build Osctrl Docker images"
inputs:
  osctrl_component:
    required: true
    description: Define the osctrl component to compile
  build_id:
    required: true
    description: tag for the docker image
  cr_username:
    required: true
    description: Pass container registry username
  cr_access_token:
    required: true
    description: Pass container registry access token


runs:
  using: "composite"
  steps:
    # # ########################### Checkout code ###########################
    # - name: Checkout code
    #   uses: actions/checkout@v4
    #   with:
    #     fetch-depth: 2
    - name: Setup Ko
      uses: ko-build/setup-ko@v0.6
    - name: Login to harbor
      shell: bash
      run: |
        ko login harbor.maersk.io -u ${{ inputs.cr_username }} -p ${{ inputs.cr_access_token }}
    - name: Build and Push Dev Image
      shell: bash
      run: |
        export KO_DOCKER_REPO=harbor.maersk.io/mop/osctrl-${{ inputs.osctrl_component }}
        ko build ./${{ inputs.osctrl_component }} -t ${{ inputs.build_id }} --bare --platform=linux/amd64,linux/arm64